name: Deploy to AWS & Render (Parallel + Reports)

on:
  # 1. Chạy khi merge code vào main (Deploy thật)
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  
  # 2. Chạy khi có người tạo Pull Request vào main (Chỉ Test & Build thử)
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  # ====================================================
  # JOB 1: TEST & BUILD
  # (Chạy cho cả PR và Push để đảm bảo code sạch)
  # ====================================================
  build-and-push:
    name: 🧪 Test & 🐳 Build Docker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        working-directory: backend
        run: mvn test -Dtest="*ControllerUnitTest"
      
      # Upload Report dù Pass hay Fail
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: surefire-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Publish Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: true

      # --- LOGIC QUAN TRỌNG: CHỈ LOGIN DOCKER KHI LÀ PUSH ---
      - name: Login to Docker Hub
        if: github.event_name == 'push'  # Chỉ login nếu là Push (Merge)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- LOGIC QUAN TRỌNG: CHỈ PUSH IMAGE KHI LÀ PUSH ---
      # Nếu là PR: Nó sẽ chỉ Build thử xem có lỗi không (push: false)
      # Nếu là Push: Nó sẽ Build và Đẩy lên Hub (push: true)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }} 
          tags: huuhuydng/slib-backend:latest
          platforms: linux/amd64

  # ====================================================
  # JOB 2: DEPLOY AWS (CHẶN NẾU LÀ PR)
  # ====================================================
  deploy-aws:
    name: 🚀 Deploy to AWS EC2
    needs: build-and-push
    if: github.event_name == 'push'  # <--- Dòng này chặn PR deploy
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔥 AWS: Starting Deployment..."
            sudo docker rm -f slib-api || true
            sudo docker rmi huuhuydng/slib-backend:latest || true
            sudo docker pull huuhuydng/slib-backend:latest
            sudo docker run -d \
              --name slib-api \
              -p 8080:8080 \
              --restart always \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              huuhuydng/slib-backend:latest
            echo "✅ AWS: Deployment Successful!"

  # ====================================================
  # JOB 3: DEPLOY RENDER (CHẶN NẾU LÀ PR)
  # ====================================================
  deploy-render:
    name: 🚀 Deploy to Render
    needs: build-and-push
    if: github.event_name == 'push'  # <--- Dòng này chặn PR deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🔥 Render: Triggering Deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"