name: Backend CI/CD (Docker Microservices)

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/slib_backend_ci_cd.yml'
  
  pull_request:
    branches: [ "develop" ]
    paths:
      - 'backend/**'

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  # ====================================================
  # JOB 1: TEST & BUILD
  # ====================================================
  test-and-build:
    name: 🧪 Test & 🐳 Build Docker
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Slib@123
          POSTGRES_DB: slib
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/slib
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: Slib@123
        run: mvn test -Dtest="*ControllerUnitTest"
      
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: surefire-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Publish Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: true

      # Docker Build & Push (only on push to main)
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            huuhuydng/slib-backend:latest
            huuhuydng/slib-backend:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ====================================================
  # JOB 2: DEPLOY AWS EC2
  # ====================================================
  deploy-aws:
    name: 🚀 Deploy to AWS EC2
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔥 AWS: Starting Deployment..."
            sudo docker rm -f slib-api || true
            sudo docker rmi huuhuydng/slib-backend:latest || true
            sudo docker pull huuhuydng/slib-backend:latest
            sudo docker run -d \
              --name slib-api \
              -p 8080:8080 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              huuhuydng/slib-backend:latest
            echo "✅ AWS: Deployment Successful!"

  # ====================================================
  # JOB 3: DEPLOY RENDER (Backup)
  # ====================================================
  deploy-render:
    name: 🚀 Deploy to Render
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🔥 Render: Triggering Deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render: Deploy Hook Triggered!"