name: Frontend CI (Test & Build)

# Trigger: Chạy khi có thay đổi ở thư mục frontend
on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend_ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  build-and-test-frontend:
    name: ⚛️ Test & Build Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      # Run Linter (if script exists)
      - name: Run Lint
        run: npm run lint --if-present
        continue-on-error: true

      # Run Unit Tests
      - name: Run Unit Tests
        run: npm test -- --run --passWithNoTests
        continue-on-error: true
        
      # Build Project
      - name: Build Project
        run: npm run build
        env:
          VITE_API_URL: https://api.slib.example.com

      # Upload build artifacts
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7