name: AI Service CI/CD

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'ai-service/**'
      - '.github/workflows/ai_service_ci_cd.yml'
  
  pull_request:
    branches: [ "develop" ]
    paths:
      - 'ai-service/**'

permissions:
  contents: read
  checks: write

jobs:
  # ====================================================
  # JOB 1: TEST & BUILD
  # ====================================================
  test-and-build:
    name: 🐍 Test & 🐳 Build AI Service
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Slib@123
          POSTGRES_DB: slib
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install Dependencies
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx



      - name: Run Tests
        working-directory: ai-service
        env:
          DATABASE_URL: postgresql://postgres:Slib@123@localhost:5432/slib
          OLLAMA_URL: http://localhost:11434
          AI_PROVIDER: ollama
          OLLAMA_MODEL: llama3.2
        run: |
          # Run basic import test
          python -c "from app.main import app; print('✅ Import successful')"
          # Run pytest if tests exist
          if [ -d "tests" ]; then
            pytest tests/ -v
          fi

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-service-test-reports
          path: ai-service/pytest-results/
          retention-days: 7
          if-no-files-found: ignore

      # Docker Build & Push (only on push to main)
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            huuhuydng/slib-ai-service:latest
            huuhuydng/slib-ai-service:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ====================================================
  # JOB 2: DEPLOY AWS EC2 (Optional)
  # ====================================================
  deploy-aws:
    name: 🚀 Deploy AI Service to AWS
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔥 AWS: Deploying AI Service..."
            sudo docker rm -f slib-ai-service || true
            sudo docker rmi huuhuydng/slib-ai-service:latest || true
            sudo docker pull huuhuydng/slib-ai-service:latest
            sudo docker run -d \
              --name slib-ai-service \
              -p 8001:8001 \
              --restart always \
              -e DATABASE_URL="${{ secrets.AI_DATABASE_URL }}" \
              -e OLLAMA_URL="${{ secrets.OLLAMA_URL }}" \
              -e AI_PROVIDER=ollama \
              -e JAVA_BACKEND_URL="http://slib-api:8080/slib" \
              --network host \
              huuhuydng/slib-ai-service:latest
            echo "✅ AWS: AI Service Deployed!"
