name: Deploy Branch To VM

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Tên branch cần deploy lên VM"
        required: true
        default: "feature/ver-01-04-2026"
      rebuild_ai:
        description: "Build lại AI service"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-branch-vm
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy selected branch to VM
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/slib_vm_deploy
          chmod 600 ~/.ssh/slib_vm_deploy
          ssh-keygen -y -f ~/.ssh/slib_vm_deploy > /dev/null

      - name: Deploy selected branch on VM
        env:
          VPS_HOST: ${{ secrets.VPS_TAILSCALE_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          REBUILD_AI: ${{ github.event.inputs.rebuild_ai }}
        run: |
          ssh -i ~/.ssh/slib_vm_deploy \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            "${VPS_USER}@${VPS_HOST}" \
            "TARGET_BRANCH='${TARGET_BRANCH}' REBUILD_AI='${REBUILD_AI}' bash -s" <<'EOF'
            set -euo pipefail

            cd /opt/SLIB

            git fetch origin "${TARGET_BRANCH}"
            git checkout -B vm-feature-deploy FETCH_HEAD

            echo "Deploying branch: ${TARGET_BRANCH}"
            echo "HEAD: $(git rev-parse HEAD)"

            cd frontend
            npm ci
            npm run build
            rsync -a --delete dist/ /var/www/slib/
            cd ..

            services="slib-backend"
            if [ "${REBUILD_AI}" = "true" ]; then
              services="slib-backend slib-ai-service"
            fi

            docker compose up -d --build ${services}

            backend_health_file="$(mktemp)"
            ai_health_file="$(mktemp)"

            for _ in $(seq 1 36); do
              if curl -fsS http://127.0.0.1:8080/actuator/health > "${backend_health_file}" && grep -q '"status":"UP"' "${backend_health_file}"; then
                break
              fi
              sleep 10
            done

            echo "Backend health:"
            cat "${backend_health_file}"
            echo
            grep -q '"status":"UP"' "${backend_health_file}"

            if [ "${REBUILD_AI}" = "true" ]; then
              for _ in $(seq 1 24); do
                if curl -fsS http://127.0.0.1:8001/health > "${ai_health_file}" && grep -q '"status":"healthy"' "${ai_health_file}"; then
                  break
                fi
                sleep 10
              done

              echo "AI health:"
              cat "${ai_health_file}"
              echo
              grep -q '"status":"healthy"' "${ai_health_file}"
            fi

            echo "Deployed branch on VM:"
            git branch --show-current
            git rev-parse HEAD
          EOF
