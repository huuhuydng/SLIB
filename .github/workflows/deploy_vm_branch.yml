name: Deploy Branch To VM

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Tên branch cần deploy lên VM"
        required: true
        default: "feature/ver-01-04-2026"
      deploy_frontend:
        description: "Build và deploy frontend"
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: "Build và deploy backend"
        required: true
        default: true
        type: boolean
      deploy_ai:
        description: "Build và deploy AI service"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-branch-vm
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy selected branch to VM
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/slib_vm_deploy
          chmod 600 ~/.ssh/slib_vm_deploy
          ssh-keygen -y -f ~/.ssh/slib_vm_deploy > /dev/null

      - name: Diagnose VM network reachability
        env:
          VPS_HOST: ${{ secrets.VPS_TAILSCALE_HOST }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ]; then
            echo "Secret VPS_TAILSCALE_HOST đang trống"
            exit 1
          fi

          echo "Tailscale status:"
          tailscale status || true
          echo
          echo "DNS lookup for ${VPS_HOST}:"
          getent hosts "${VPS_HOST}" || true
          echo
          echo "Tailscale ping to ${VPS_HOST}:"
          tailscale ping --timeout=10s "${VPS_HOST}" || true
          echo
          echo "TCP probe to ${VPS_HOST}:22"
          nc -vz -w 5 "${VPS_HOST}" 22

      - name: Deploy selected branch on VM
        env:
          VPS_HOST: ${{ secrets.VPS_TAILSCALE_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          DEPLOY_FRONTEND: ${{ github.event.inputs.deploy_frontend }}
          DEPLOY_BACKEND: ${{ github.event.inputs.deploy_backend }}
          DEPLOY_AI: ${{ github.event.inputs.deploy_ai }}
        run: |
          ssh -i ~/.ssh/slib_vm_deploy \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            "${VPS_USER}@${VPS_HOST}" \
            "TARGET_BRANCH='${TARGET_BRANCH}' DEPLOY_FRONTEND='${DEPLOY_FRONTEND}' DEPLOY_BACKEND='${DEPLOY_BACKEND}' DEPLOY_AI='${DEPLOY_AI}' bash -s" <<'EOF'
            set -euo pipefail

            if [ "${DEPLOY_FRONTEND}" != "true" ] && [ "${DEPLOY_BACKEND}" != "true" ] && [ "${DEPLOY_AI}" != "true" ]; then
              echo "Cần chọn ít nhất một thành phần để deploy"
              exit 1
            fi

            cd /opt/SLIB

            git fetch origin "${TARGET_BRANCH}"
            git checkout -B vm-feature-deploy FETCH_HEAD

            echo "Deploying branch: ${TARGET_BRANCH}"
            echo "HEAD: $(git rev-parse HEAD)"

            if [ "${DEPLOY_FRONTEND}" = "true" ]; then
              cd frontend
              npm ci
              npm run build
              rsync -a --delete dist/ /var/www/slib/
              cd ..
            fi

            services=""
            if [ "${DEPLOY_BACKEND}" = "true" ]; then
              services="slib-backend"
            fi
            if [ "${DEPLOY_AI}" = "true" ]; then
              services="${services} slib-ai-service"
            fi

            if [ -n "${services}" ]; then
              docker compose up -d --build ${services}
            fi

            backend_health_file="$(mktemp)"
            ai_health_file="$(mktemp)"

            if [ "${DEPLOY_BACKEND}" = "true" ]; then
              for _ in $(seq 1 36); do
                if curl -fsS http://127.0.0.1:8080/actuator/health > "${backend_health_file}" && grep -q '"status":"UP"' "${backend_health_file}"; then
                  break
                fi
                sleep 10
              done

              echo "Backend health:"
              cat "${backend_health_file}"
              echo
              grep -q '"status":"UP"' "${backend_health_file}"
            fi

            if [ "${DEPLOY_AI}" = "true" ]; then
              for _ in $(seq 1 24); do
                if curl -fsS http://127.0.0.1:8001/health > "${ai_health_file}" && grep -q '"status":"healthy"' "${ai_health_file}"; then
                  break
                fi
                sleep 10
              done

              echo "AI health:"
              cat "${ai_health_file}"
              echo
              grep -q '"status":"healthy"' "${ai_health_file}"
            fi

            echo "Deployed branch on VM:"
            git branch --show-current
            git rev-parse HEAD
          EOF
