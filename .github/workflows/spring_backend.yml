name: Backend Spring Boot CI/CD

on:
  push:
    branches: [ "master" ] 
  pull_request:
    branches: [ "master" ] # Chạy test khi có người tạo Pull Request (để check code trước khi merge)

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Hoặc 'gradle' nếu bạn dùng Gradle

    # 3. Chạy Test và Build (CI)
    # Bước này sẽ check xem code có lỗi logic không, có biên dịch được không
    - name: Build with Maven
      run: mvn clean package # Hoặc './gradlew build' nếu dùng Gradle

    # 4. Deploy lên Render (CD)
    # CHỈ CHẠY NẾU BƯỚC 3 THÀNH CÔNG VÀ ĐANG Ở NHÁNH MASTER
    - name: Deploy to Render
      if: success() && github.ref == 'refs/heads/master'
      run: |
        echo "Tests passed! Deploying to Render..."
        curl "${{ secrets.RENDER_DEPLOY_HOOK }}"