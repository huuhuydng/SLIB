# --- SERVER CONFIG ---
server.port=8080

# --- DATABASE CONFIG (Docker Network) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://slib-postgres:5432/slib?stringtype=unspecified&reWriteBatchedInserts=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Slib@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool (Optimized for Docker) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# --- Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Batch insert optimization (critical for bulk import speed)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# --- JWT CONFIG ---
jwt.secret=${JWT_SECRET:SlibSecretKeyForJWTTokenGenerationMustBeAtLeast32BytesLong2024!}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# --- GOOGLE OAUTH ---
google.client-id=${GOOGLE_CLIENT_ID:262933313086-mhbevhu0b7hfqekchf6a99vnebjfr8b5.apps.googleusercontent.com}

# --- GATE SERVICE (HCE) ---
gate.secret=${GATE_SECRET:SLIB_SECRET_GATE_FPT_123}

# --- CLOUDINARY ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dsupnjcqy}
cloudinary.api-key=${CLOUDINARY_API_KEY:356659581747979}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:HlvOnlX7oJNDnoGEmWm-Y6_EPlQ}

# --- FLYWAY ---
# DISABLED: Conflicts with existing database state. Using Hibernate ddl-auto to create new tables.
spring.flyway.enabled=false

# --- MULTIPART FILE UPLOAD ---
# Global limits (per-endpoint validation provides additional protection)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=250MB

# --- AI SERVICE ENDPOINT (Docker Network) ---
# Use host.docker.internal to connect from Docker container to AI Service on host machine
app.ai-service.url=http://host.docker.internal:8001
