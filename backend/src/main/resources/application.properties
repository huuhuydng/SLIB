# --- SERVER CONFIG ---
server.port=${PORT:8080}

# --- TIMEZONE CONFIG ---
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# --- LOCAL DOCKER PostgreSQL (Pure) ---
spring.datasource.url=jdbc:postgresql://localhost:5434/slib?stringtype=unspecified
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver


# --- Tối ưu kết nối (Tránh lỗi Max connection) ---
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# --- Hibernate Dev ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- JWT CONFIG (Local) ---
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# --- GOOGLE OAUTH ---
google.client-id=${GOOGLE_CLIENT_ID:}

# --- GATE SERVICE (HCE) ---
gate.secret=${GATE_SECRET:}
slib.hce.offline-threshold-seconds=${HCE_OFFLINE_THRESHOLD_SECONDS:300}

# --- INTERNAL SERVICE AUTH ---
slib.internal.api-key=${INTERNAL_API_KEY:}

# --- CLOUDINARY ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- FLYWAY DATABASE MIGRATION ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# --- MULTIPART FILE UPLOAD ---
# Global limits (per-endpoint validation provides additional protection)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=250MB

# --- EMAIL CONFIGURATION (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=slib.system@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- AI SERVICE ---
app.ai-service.url=http://127.0.0.1:8001

# --- KIOSK CONFIG ---
kiosk.qr.ttl-seconds=600
kiosk.qr.algorithm=HmacSHA256
kiosk.online-threshold-seconds=${KIOSK_ONLINE_THRESHOLD_SECONDS:120}
app.frontend-url=${APP_FRONTEND_URL:https://slibsystem.site}

# --- KIOSK AUTHENTICATION ---
# Bật/tắt kiosk authentication (true = bật, false = tắt)
slib.kiosk.enabled=${KIOSK_AUTH_ENABLED:true}
# IP whitelist (cách nhau bằng dấu phẩy), dùng * để cho phép tất cả
slib.kiosk.whitelist-ips=127.0.0.1,localhost,0:0:0:0:0:0:0:1
# Secret key để xác thực kiosk (nếu không dùng IP whitelist)
slib.kiosk.secret-key=${KIOSK_SECRET_KEY:}
