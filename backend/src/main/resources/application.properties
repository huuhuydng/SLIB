# =========================================
# SLIB BACKEND - APPLICATION CONFIG
# Support: Mobile App + Web Admin
# =========================================

# --- SERVER CONFIG ---
server.port=${PORT:8081}

# --- DATABASE CONFIG ---
# Environment variable pattern: ${ENV_VAR:default_value}
# Production: Set via environment variables
# Local: Uses default values (Supabase local)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:54322/postgres?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool Optimization ---
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# --- Hibernate / JPA Config ---
# Development: update (auto-create/update tables)
# Production: validate (only validate schema, no changes)
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Logging levels for debugging
logging.level.slib.com.example=DEBUG
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

